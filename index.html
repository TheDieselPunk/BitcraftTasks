<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveler Tasks — BitCraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #07070f;
      color: #c8c8dc;
      min-height: 100vh;
      padding: 0 0 64px;
    }

    /* ── Top bar ── */
    #topbar {
      background: #0d0d1e;
      border-bottom: 2px solid #2a2a5a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    #logo {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: .1em;
      color: #f0a500;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #logo span { color: #444466; font-weight: 400; font-size: .75rem; letter-spacing: .04em; }
    #logo-desc { color: #333355; font-size: .7rem; font-weight: 400; letter-spacing: .02em; text-transform: none; margin-top: 2px; }

    #search-row { display: flex; gap: 8px; flex: 1; max-width: 360px; }
    #search-row input {
      flex: 1; padding: 7px 12px; border-radius: 5px;
      border: 1px solid #2a2a5a; background: #09091a;
      color: #c8c8dc; font-size: .85rem;
    }
    #search-row input:focus { outline: none; border-color: #f0a500; }
    #search-row button {
      padding: 7px 18px; border: none; border-radius: 5px;
      background: #f0a500; color: #07070f;
      font-weight: 800; font-size: .78rem;
      cursor: pointer; letter-spacing: .06em; text-transform: uppercase;
    }
    #search-row button:hover { background: #ffc030; }
    #search-row button:disabled { opacity: .4; cursor: default; }

    /* ── Player strip ── */
    #player-strip {
      display: none;
      background: #0a0a18;
      border-bottom: 1px solid #1a1a3a;
      padding: 8px 20px;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      font-size: .8rem;
    }
    #player-strip.visible { display: flex; }
    #ps-name   { font-weight: 800; color: #f0a500; letter-spacing: .08em; text-transform: uppercase; }
    #ps-detail { color: #666688; }
    #ps-market { display: flex; align-items: center; gap: 6px; color: #b47cff; font-size: .75rem; }
    #claim-input { background: #0f0f28; color: #b47cff; border: 1px solid #2a2a5a; border-radius: 4px; padding: 2px 6px; font-size: .75rem; width: 180px; }
    #expiry-cd { font-size: .8rem; font-weight: 700; }
    .cd-ok     { color: #5bc8e8; }
    .cd-warn   { color: #f0a500; }
    .cd-urgent { color: #e05050; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #range-group {
      display: flex; align-items: center; gap: 8px;
      font-size: .75rem; color: #666688; margin-left: auto;
    }
    #range-group input[type=range] { width: 110px; accent-color: #f0a500; }
    #range-val { color: #f0a500; font-weight: 700; min-width: 36px; }

    /* ── Watch row ── */
    #watch-row {
      display: none;
      background: #090916;
      border-bottom: 1px solid #1a1a3a;
      padding: 7px 20px;
      gap: 8px; align-items: center; flex-wrap: wrap;
      font-size: .75rem;
    }
    #watch-row.visible { display: flex; }
    #watch-label { color: #444466; white-space: nowrap; }
    #watch-input {
      padding: 5px 10px; border-radius: 4px;
      border: 1px solid #2a2a5a; background: #09091a;
      color: #c8c8dc; font-size: .8rem; width: 180px;
    }
    #watch-input:focus { outline: none; border-color: #b47cff; }
    #btn-watch-add {
      padding: 5px 12px; border: 1px solid #3a2a6a; border-radius: 4px;
      background: #14092a; color: #b47cff;
      font-size: .72rem; font-weight: 700; cursor: pointer;
      letter-spacing: .05em; text-transform: uppercase;
    }
    #btn-watch-add:hover { background: #1e0f3a; border-color: #b47cff; }
    #watch-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .watch-chip {
      display: flex; align-items: center; gap: 5px;
      background: #1a0a30; border: 1px solid #3a2060;
      border-radius: 12px; padding: 2px 10px 2px 10px;
      color: #b47cff; font-size: .7rem; cursor: default;
    }
    .watch-chip button {
      background: none; border: none; color: #6a4a99;
      font-size: .8rem; cursor: pointer; padding: 0; line-height: 1;
    }
    .watch-chip button:hover { color: #e05050; }

    /* ── Toolbar ── */
    #toolbar {
      display: none; padding: 8px 20px;
      gap: 8px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid #1a1a3a;
    }
    #toolbar.visible { display: flex; }
    #toolbar button {
      padding: 4px 12px;
      border: 1px solid #2a2a5a;
      border-radius: 4px; cursor: pointer;
      font-size: .7rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      background: #0d0d1e; color: #666688;
    }
    #toolbar button:hover { border-color: #f0a500; color: #f0a500; }
    #btn-filter.active { background: #0a1f0a; border-color: #52c46a; color: #52c46a; }
    #status     { font-size: .7rem; color: #444466; }
    #refresh-cd { font-size: .68rem; color: #333355; margin-left: auto; }

    /* ── Table ── */
    #tbl-wrap { overflow-x: auto; padding: 0; }
    #exp-section { padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .exp-label   { color: #666688; font-size: .75rem; margin-right: 4px; }
    .exp-chip    { background: #0f0f28; border: 1px solid #2a2a5a; border-radius: 12px; padding: 3px 10px; font-size: .75rem; display: inline-flex; gap: 6px; }
    .exp-skill   { color: #b47cff; }
    .exp-amt     { color: #5bc8e8; font-weight: 700; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: .77rem;
      min-width: 920px;
    }
    thead th {
      background: #0d0d1e;
      color: #f0a500;
      padding: 7px 10px;
      text-align: left;
      position: sticky; top: 0; z-index: 2;
      white-space: nowrap;
      border-bottom: 2px solid #2a2a5a;
      font-size: .68rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #14142e; color: #ffc030; }
    td { padding: 6px 10px; vertical-align: top; border-bottom: 1px solid #111128; }
    tr.task-row:hover td { background: #0e0e20; }
    tr.task-row { border-bottom: 2px solid #1a1a38; }

    /* cell styles */
    .c-traveler  { font-weight: 800; color: #f0a500; white-space: nowrap; letter-spacing: .06em; }
    .c-items     { color: #c8c8dc; line-height: 1.7; }
    .c-inv       { max-width: 120px; line-height: 1.7; }
    .c-stalls    { max-width: 220px; line-height: 1.7; }
    .c-market    { max-width: 160px; line-height: 1.7; }
    .c-craft     { line-height: 1.7; }
    .c-num       { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }

    .qty         { color: #5bc8e8; font-weight: 700; }
    .sub         { color: #444466; font-size: .67rem; }
    .inv-ok      { color: #52c46a; font-size: .72rem; font-weight: 700; }
    .inv-part    { color: #f0a500; font-size: .72rem; font-weight: 700; }
    .craft-ok    { color: #52c46a; font-weight: 700; }
    .craft-no    { color: #333355; font-size: .7rem; }
    .stall-name  { color: #b47cff; font-size: .7rem; }
    .market-name { color: #5bc8e8; font-size: .7rem; font-weight: 700; }
    .market-price{ color: #f0a500; font-weight: 700; }
    .na          { color: #2a2a4a; font-style: italic; font-size: .68rem; }
    .dim         { color: #333355; font-size: .7rem; }
    .profit-pos     { color: #52c46a; font-weight: 800; }
    .profit-neg     { color: #e05050; font-weight: 800; }
    .profit-neutral { color: #666688; }
    .type-tag    { color: #444466; font-size: .62rem; background: #0d0d1e; border: 1px solid #1a1a3a; padding: 0 4px; border-radius: 3px; }

    #empty-msg { padding: 40px 20px; color: #333355; font-size: .9rem; }

    /* ── Custom tooltip ── */
    #tip-box {
      position: fixed;
      background: #0d0d1e;
      border: 1px solid #3a3a5a;
      color: #ccc;
      font-size: .72rem;
      padding: 6px 10px;
      border-radius: 5px;
      pointer-events: none;
      display: none;
      white-space: pre;
      z-index: 100;
      font-family: inherit;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <div id="logo">⬡ Traveler Tasks <span>— BitCraft Assistant</span>
      <div id="logo-desc">Look up your active traveler tasks · find nearby trader stands · track market prices</div>
    </div>
    <div id="search-row">
      <input id="username-input" type="text" placeholder="Enter player name…" list="stall-owners-list" autocomplete="off">
      <button id="btn-search">Search</button>
    </div>
  </div>

  <div id="player-strip">
    <div>
      <div id="ps-name"></div>
      <div id="ps-detail"></div>
    </div>
    <div id="ps-market">
      <span>⊙ Market:</span>
      <input id="claim-input" type="text" placeholder="Select claim…" list="claim-list" autocomplete="off">
      <datalist id="claim-list"></datalist>
    </div>
    <div id="expiry-cd" class="cd-ok"></div>
  </div>

  <div id="watch-row">
    <span id="watch-label">Watch traders:</span>
    <input id="watch-input" type="text" placeholder="Type a player name…" list="stall-owners-list" autocomplete="off">
    <button id="btn-watch-add">+ Add</button>
    <div id="watch-chips"></div>
  </div>
  <datalist id="stall-owners-list"></datalist>
  <div id="tip-box"></div>

  <div id="toolbar">
    <button id="btn-refresh">↺ Refresh</button>
    <button id="btn-filter">☑ Completable only</button>
    <button id="btn-csv">↓ CSV</button>
    <span id="status"></span>
    <span id="refresh-cd"></span>
  </div>

  <div id="exp-section"></div>

  <div id="tbl-wrap">
    <div id="empty-msg"></div>
    <table id="main-tbl" style="display:none">
      <thead id="tbl-head"></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
  <footer style="text-align:center;padding:2rem 0 1rem;color:#444;font-size:.75rem;letter-spacing:.05em;">
    ✦ vibe-coded by <span style="color:#f0a500">Billard</span> &amp; <span style="color:#7b5ea7">Claude</span> ✦
  </footer>
</body>
</html>
