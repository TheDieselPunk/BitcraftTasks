<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveler Tasks — BitCraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --panel:     #0d0d1e;
      --panel2:    #11112a;
      --border:    #1e1e45;
      --border2:   #2a2a5a;
      --gold:      #f0a500;
      --gold2:     #ffc030;
      --gold-dim:  #7a5200;
      --teal:      #5bc8e8;
      --green:     #52c46a;
      --red:       #e05050;
      --purple:    #b47cff;
      --text:      #c8c8dc;
      --text-dim:  #555570;
      --text-mid:  #8888aa;
      --card-w:    340px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 64px;
    }

    /* ── Top bar ── */
    #topbar {
      background: var(--panel);
      border-bottom: 2px solid var(--border2);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    #logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
    }
    #logo span { color: var(--text-dim); font-weight: 400; font-size: .75rem; letter-spacing: .06em; }

    #search-row {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 380px;
    }
    #search-row input {
      flex: 1;
      padding: 7px 12px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      background: #09091a;
      color: var(--text);
      font-size: .85rem;
    }
    #search-row input:focus { outline: none; border-color: var(--gold); }
    #search-row button {
      padding: 7px 18px;
      border: none;
      border-radius: 5px;
      background: var(--gold);
      color: #07070f;
      font-weight: 800;
      font-size: .8rem;
      cursor: pointer;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    #search-row button:hover { background: var(--gold2); }
    #search-row button:disabled { opacity: .4; cursor: default; }

    /* ── Player info strip ── */
    #player-strip {
      display: none;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    #player-strip.visible { display: flex; }
    #player-strip-name   { font-weight: 800; color: var(--gold); font-size: 1rem; letter-spacing: .08em; text-transform: uppercase; }
    #player-strip-detail { font-size: .75rem; color: var(--text-mid); }
    #expiry-cd           { font-size: .82rem; font-weight: 700; }
    .cd-ok    { color: var(--teal); }
    .cd-warn  { color: var(--gold); }
    .cd-urgent{ color: var(--red); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #range-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .75rem;
      color: var(--text-mid);
      margin-left: auto;
    }
    #range-group input[type=range] { width: 110px; accent-color: var(--gold); }
    #range-val { color: var(--gold); font-weight: 700; min-width: 36px; }

    /* ── Toolbar ── */
    #toolbar {
      display: none;
      padding: 10px 24px;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    #toolbar.visible { display: flex; }
    #toolbar button {
      padding: 5px 14px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      cursor: pointer;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: var(--panel2);
      color: var(--text-mid);
    }
    #toolbar button:hover { border-color: var(--gold); color: var(--gold); }
    #btn-filter.active { background: #0d2a0d; border-color: var(--green); color: var(--green); }
    #task-count  { font-size: .75rem; color: var(--text-mid); font-weight: 600; }
    #status      { font-size: .72rem; color: var(--text-dim); margin-left: 4px; }
    #refresh-cd  { font-size: .7rem; color: var(--text-dim); margin-left: auto; }

    /* ── Cards grid ── */
    #cards-wrap {
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }

    #empty-msg {
      padding: 48px 24px;
      color: var(--text-dim);
      font-size: .9rem;
    }

    /* ── Task card ── */
    .task-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: var(--card-w);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .task-card:hover { border-color: var(--border2); }

    .card-header {
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-label   { font-size: .62rem; font-weight: 800; letter-spacing: .14em; color: var(--text-dim); text-transform: uppercase; }
    .card-reward  { font-size: .8rem; font-weight: 800; color: var(--gold); white-space: nowrap; }

    .card-traveler {
      padding: 10px 12px 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .traveler-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--panel2);
      border: 2px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    .traveler-name {
      font-weight: 800;
      font-size: .9rem;
      letter-spacing: .1em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .traveler-desc {
      font-size: .7rem;
      color: var(--text-mid);
      margin-top: 2px;
      line-height: 1.35;
    }

    .card-divider { height: 1px; background: var(--border); margin: 0 12px; }

    /* ── Item rows ── */
    .card-items  { padding: 8px 12px; display: flex; flex-direction: column; gap: 10px; }
    .item-block  { display: flex; flex-direction: column; gap: 3px; }
    .item-row    { display: flex; align-items: center; gap: 8px; }
    .item-qty    { font-size: .9rem; font-weight: 800; color: var(--teal); min-width: 28px; text-align: right; }
    .item-name   { font-size: .82rem; color: var(--text); font-weight: 600; }
    .item-type   { font-size: .62rem; color: var(--text-dim); background: var(--panel2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }

    .item-meta   { display: flex; flex-direction: column; gap: 2px; padding-left: 36px; }
    .meta-row    { display: flex; align-items: flex-start; gap: 6px; font-size: .68rem; line-height: 1.4; }
    .meta-icon   { color: var(--text-dim); min-width: 12px; margin-top: 1px; }
    .meta-text   { color: var(--text-mid); }
    .val-ok      { color: var(--green); font-weight: 700; }
    .val-part    { color: var(--gold); font-weight: 700; }
    .val-no      { color: var(--text-dim); }
    .val-stall   { color: var(--purple); }
    .val-gold    { color: var(--gold); }
    .loading     { color: var(--text-dim); font-style: italic; }

    /* ── Card footer ── */
    .card-footer {
      margin-top: auto;
      background: var(--panel2);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .footer-cost   { font-size: .72rem; color: var(--text-mid); }
    .footer-profit { font-size: .82rem; font-weight: 800; }
    .profit-pos    { color: var(--green); }
    .profit-neg    { color: var(--red); }
    .footer-craft  { font-size: .68rem; color: var(--text-mid); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <div id="logo">⬡ Traveler Tasks <span>— BitCraft Assistant</span></div>
    <div id="search-row">
      <input id="username-input" type="text" placeholder="Enter player name…" autocomplete="off">
      <button id="btn-search">Search</button>
    </div>
  </div>

  <!-- Player info -->
  <div id="player-strip">
    <div>
      <div id="player-strip-name"></div>
      <div id="player-strip-detail"></div>
    </div>
    <div id="expiry-cd" class="cd-ok"></div>
    <div id="range-group">
      <label for="range-slider">Stall range:</label>
      <input id="range-slider" type="range" min="100" max="5000" step="100" value="1000">
      <span id="range-val">1000</span> u
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-refresh">↺ Refresh</button>
    <button id="btn-filter">☑ Completable only</button>
    <button id="btn-csv">↓ CSV</button>
    <span id="task-count"></span>
    <span id="status"></span>
    <span id="refresh-cd"></span>
  </div>

  <!-- Content -->
  <div id="empty-msg"></div>
  <div id="cards-wrap"></div>

  <script src="app.js"></script>
</body>
</html>
