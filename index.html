<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveler Tasks — BitCraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0d0d1a;
      color: #ccc;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 1.3rem;
      color: #f0a500;
      letter-spacing: .04em;
      margin-bottom: 20px;
    }
    h1 span { color: #555; font-weight: 400; font-size: .85rem; }

    /* ── Search bar ── */
    #search-row {
      display: flex;
      gap: 8px;
      max-width: 480px;
      margin-bottom: 16px;
    }
    #search-row input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a2a50;
      background: #12121e;
      color: #ddd;
      font-size: .9rem;
    }
    #search-row input:focus { outline: none; border-color: #f0a500; }
    #search-row button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      background: #f0a500;
      color: #0d0d1a;
      font-weight: 700;
      cursor: pointer;
      font-size: .85rem;
    }
    #search-row button:hover { background: #ffc030; }
    #search-row button:disabled { opacity: .5; cursor: default; }

    /* ── Player card ── */
    #player-card {
      display: none;
      align-items: center;
      gap: 16px;
      background: #12121e;
      border: 1px solid #2a2a50;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 14px;
      max-width: 720px;
      flex-wrap: wrap;
    }
    #player-card.visible { display: flex; }
    #player-name  { font-weight: 700; color: #f0a500; font-size: .95rem; }
    #player-pos   { font-size: .8rem; color: #7ec8e3; }
    #range-group  { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: #888; margin-left: auto; }
    #range-group input[type=range] { width: 120px; accent-color: #f0a500; }
    #range-val    { color: #f0a500; font-weight: 700; min-width: 40px; }

    /* ── Toolbar ── */
    #toolbar {
      display: none;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    #toolbar.visible { display: flex; }
    #toolbar button {
      padding: 4px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: .75rem;
      font-weight: 600;
    }
    #btn-refresh  { background: #1a3a5c; color: #fff; }
    #btn-filter   { background: #252535; color: #999; font-weight: 400; }
    #btn-filter.active { background: #1a4a1a; color: #7cfc00; font-weight: 700; }
    #btn-csv      { background: #1a5c35; color: #fff; }
    #status       { font-size: .72rem; color: #777; margin-left: 4px; }
    #refresh-cd   { font-size: .7rem; color: #3a3a55; margin-left: auto; }
    #expiry-cd    { font-size: .82rem; font-weight: 600; }
    .cd-ok        { color: #7ec8e3; }
    .cd-urgent    { color: #e05050; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Table ── */
    #tbl-wrap {
      overflow-x: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: .78rem;
      min-width: 860px;
    }
    thead th {
      background: #1a1a30;
      color: #f0a500;
      padding: 7px 10px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
      border-bottom: 2px solid #2a2a50;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #22224a; color: #ffc030; }
    td { padding: 6px 10px; vertical-align: top; border-bottom: 1px solid #191928; }
    tr.task-row:hover td { background: #161624; }
    tr.task-row { border-bottom: 2px solid #28284a; }

    /* cell classes */
    .c-traveler  { font-weight: 700; color: #f0a500; white-space: nowrap; }
    .c-items     { color: #ccc; line-height: 1.7; }
    .c-inv       { max-width: 150px; line-height: 1.7; }
    .c-stalls    { max-width: 260px; line-height: 1.7; }
    .c-craft     { line-height: 1.7; }
    .c-num       { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .qty         { color: #7ec8e3; font-weight: 700; }
    .sub         { color: #3a3a55; font-size: .68rem; }
    .inv-ok      { color: #4caf50; font-size: .72rem; }
    .inv-part    { color: #e0a030; font-size: .72rem; }
    .craft-ok    { color: #4caf50; font-weight: 600; }
    .craft-no    { color: #383850; font-size: .72rem; }
    .stall-name  { color: #c97bff; font-size: .72rem; }
    .na          { color: #333; font-style: italic; font-size: .7rem; }
    .dim         { color: #383850; font-size: .72rem; }
    .profit-pos  { color: #4caf50; font-weight: 700; }
    .profit-neg  { color: #e05050; font-weight: 700; }
    .hex         { color: #f0a500; }

    #empty-msg { padding: 32px; color: #555; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>⬡ Traveler Tasks <span>— BitCraft Assistant</span></h1>

  <div id="search-row">
    <input id="username-input" type="text" placeholder="Enter player name…" autocomplete="off">
    <button id="btn-search">Search</button>
  </div>

  <div id="player-card">
    <div>
      <div id="player-name"></div>
      <div id="player-pos"></div>
    </div>
    <div id="range-group">
      <label for="range-slider">Stall range:</label>
      <input id="range-slider" type="range" min="100" max="3000" step="50" value="500">
      <span id="range-val">500</span>
    </div>
    <div id="expiry-cd" class="cd-ok"></div>
  </div>

  <div id="toolbar">
    <button id="btn-refresh">↺ Refresh</button>
    <button id="btn-filter">☑ Completable</button>
    <button id="btn-csv">↓ CSV</button>
    <span id="status"></span>
    <span id="refresh-cd"></span>
  </div>

  <div id="tbl-wrap">
    <div id="empty-msg"></div>
    <table id="main-tbl" style="display:none">
      <thead id="tbl-head"></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
