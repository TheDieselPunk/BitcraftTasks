<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveler Tasks — BitCraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #07070f;
      color: #c8c8dc;
      min-height: 100vh;
      padding: 0 0 64px;
    }

    /* ── Top bar ── */
    #topbar {
      background: #0d0d1e;
      border-bottom: 2px solid #2a2a5a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    #logo {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: .1em;
      color: #f0a500;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #logo span { color: #444466; font-weight: 400; font-size: .75rem; letter-spacing: .04em; }

    #search-row { display: flex; gap: 8px; flex: 1; max-width: 360px; }
    #search-row input {
      flex: 1; padding: 7px 12px; border-radius: 5px;
      border: 1px solid #2a2a5a; background: #09091a;
      color: #c8c8dc; font-size: .85rem;
    }
    #search-row input:focus { outline: none; border-color: #f0a500; }
    #search-row button {
      padding: 7px 18px; border: none; border-radius: 5px;
      background: #f0a500; color: #07070f;
      font-weight: 800; font-size: .78rem;
      cursor: pointer; letter-spacing: .06em; text-transform: uppercase;
    }
    #search-row button:hover { background: #ffc030; }
    #search-row button:disabled { opacity: .4; cursor: default; }

    /* ── Player strip ── */
    #player-strip {
      display: none;
      background: #0a0a18;
      border-bottom: 1px solid #1a1a3a;
      padding: 8px 20px;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      font-size: .8rem;
    }
    #player-strip.visible { display: flex; }
    #ps-name   { font-weight: 800; color: #f0a500; letter-spacing: .08em; text-transform: uppercase; }
    #ps-detail { color: #666688; }
    #ps-market { color: #b47cff; font-size: .75rem; }
    #expiry-cd { font-size: .8rem; font-weight: 700; }
    .cd-ok     { color: #5bc8e8; }
    .cd-warn   { color: #f0a500; }
    .cd-urgent { color: #e05050; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #range-group {
      display: flex; align-items: center; gap: 8px;
      font-size: .75rem; color: #666688; margin-left: auto;
    }
    #range-group input[type=range] { width: 110px; accent-color: #f0a500; }
    #range-val { color: #f0a500; font-weight: 700; min-width: 36px; }

    /* ── Toolbar ── */
    #toolbar {
      display: none; padding: 8px 20px;
      gap: 8px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid #1a1a3a;
    }
    #toolbar.visible { display: flex; }
    #toolbar button {
      padding: 4px 12px;
      border: 1px solid #2a2a5a;
      border-radius: 4px; cursor: pointer;
      font-size: .7rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      background: #0d0d1e; color: #666688;
    }
    #toolbar button:hover { border-color: #f0a500; color: #f0a500; }
    #btn-filter.active { background: #0a1f0a; border-color: #52c46a; color: #52c46a; }
    #status     { font-size: .7rem; color: #444466; }
    #refresh-cd { font-size: .68rem; color: #333355; margin-left: auto; }

    /* ── Table ── */
    #tbl-wrap { overflow-x: auto; padding: 0; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: .77rem;
      min-width: 920px;
    }
    thead th {
      background: #0d0d1e;
      color: #f0a500;
      padding: 7px 10px;
      text-align: left;
      position: sticky; top: 0; z-index: 2;
      white-space: nowrap;
      border-bottom: 2px solid #2a2a5a;
      font-size: .68rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #14142e; color: #ffc030; }
    td { padding: 6px 10px; vertical-align: top; border-bottom: 1px solid #111128; }
    tr.task-row:hover td { background: #0e0e20; }
    tr.task-row { border-bottom: 2px solid #1a1a38; }

    /* cell styles */
    .c-traveler  { font-weight: 800; color: #f0a500; white-space: nowrap; letter-spacing: .06em; }
    .c-items     { color: #c8c8dc; line-height: 1.7; }
    .c-inv       { max-width: 120px; line-height: 1.7; }
    .c-stalls    { max-width: 220px; line-height: 1.7; }
    .c-market    { max-width: 160px; line-height: 1.7; }
    .c-craft     { line-height: 1.7; }
    .c-num       { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }

    .qty         { color: #5bc8e8; font-weight: 700; }
    .sub         { color: #444466; font-size: .67rem; }
    .inv-ok      { color: #52c46a; font-size: .72rem; font-weight: 700; }
    .inv-part    { color: #f0a500; font-size: .72rem; font-weight: 700; }
    .craft-ok    { color: #52c46a; font-weight: 700; }
    .craft-no    { color: #333355; font-size: .7rem; }
    .stall-name  { color: #b47cff; font-size: .7rem; }
    .market-name { color: #5bc8e8; font-size: .7rem; font-weight: 700; }
    .market-price{ color: #f0a500; font-weight: 700; }
    .na          { color: #2a2a4a; font-style: italic; font-size: .68rem; }
    .dim         { color: #333355; font-size: .7rem; }
    .profit-pos  { color: #52c46a; font-weight: 800; }
    .profit-neg  { color: #e05050; font-weight: 800; }
    .type-tag    { color: #444466; font-size: .62rem; background: #0d0d1e; border: 1px solid #1a1a3a; padding: 0 4px; border-radius: 3px; }

    #empty-msg { padding: 40px 20px; color: #333355; font-size: .9rem; }
  </style>
</head>
<body>

  <div id="topbar">
    <div id="logo">⬡ Traveler Tasks <span>— BitCraft Assistant</span></div>
    <div id="search-row">
      <input id="username-input" type="text" placeholder="Enter player name…" autocomplete="off">
      <button id="btn-search">Search</button>
    </div>
  </div>

  <div id="player-strip">
    <div>
      <div id="ps-name"></div>
      <div id="ps-detail"></div>
    </div>
    <div id="ps-market"></div>
    <div id="expiry-cd" class="cd-ok"></div>
    <div id="range-group">
      <label for="range-slider">Stall range:</label>
      <input id="range-slider" type="range" min="100" max="5000" step="100" value="1000">
      <span id="range-val">1000h</span> <span class="sub" title="Distance unit used throughout this page">hexes</span>
    </div>
  </div>

  <div id="toolbar">
    <button id="btn-refresh">↺ Refresh</button>
    <button id="btn-filter">☑ Completable only</button>
    <button id="btn-csv">↓ CSV</button>
    <span id="status"></span>
    <span id="refresh-cd"></span>
  </div>

  <div id="tbl-wrap">
    <div id="empty-msg"></div>
    <table id="main-tbl" style="display:none">
      <thead id="tbl-head"></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
